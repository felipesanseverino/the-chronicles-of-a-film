<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e0e0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="tcof">
<title>Series — the chronicles of a film</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Overpass+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  /* ── PAGE HEADER ── */
  .series-header {
    min-height: 55vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding-top: 6rem;
  }

  .series-header-left {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 4rem 3rem;
  }

  .back-link {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: lowercase;
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 2.5rem;
    transition: color 0.2s;
  }
  .back-link::before { content: '←'; }
  .back-link:hover { color: var(--accent); }

  .series-eyebrow {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: lowercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .series-page-title {
    font-family: var(--serif);
    font-size: clamp(3rem, 6vw, 5.5rem);
    font-weight: 400;
    line-height: 0.95;
    color: var(--white);
    margin-bottom: 1.5rem;
    text-transform: lowercase;
  }

  .series-page-meta {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: lowercase;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .series-description {
    font-family: var(--serif);
    font-size: 1rem;
    line-height: 1.85;
    color: var(--muted);
    font-style: italic;
    max-width: 44ch;
  }

  .series-header-right {
    position: relative;
    overflow: hidden;
  }

  .series-hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(15%) contrast(1.05);
    cursor: crosshair;
    transition: filter 0.6s;
  }

  .series-hero-img:hover { filter: grayscale(0%); }

  .series-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, var(--bg) 0%, transparent 25%);
    pointer-events: none;
  }

  /* ── PHOTO GRID ── */
  .photos-section {
    padding: 5rem 3rem 8rem;
  }

  .photos-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
    margin-bottom: 4rem;
  }

  .photos-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: lowercase;
    color: var(--muted);
  }

  .photos-count {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
  }

  .photo-grid {
    columns: 3;
    column-gap: 1rem;
  }

  .photo-item {
    position: relative;
    overflow: hidden;
    cursor: crosshair;
    break-inside: avoid;
    margin-bottom: 1rem;
  }

  .photo-item img {
    width: 100%;
    height: auto;
    display: block;
    filter: grayscale(15%) contrast(1.02);
    transition: filter 0.5s, transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .photo-item:hover img {
    filter: grayscale(0%);
    transform: scale(1.02);
  }

  .photo-index {
    position: absolute;
    bottom: 0.8rem;
    right: 0.8rem;
    font-family: var(--mono);
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.4);
    pointer-events: none;
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .series-header { grid-template-columns: 1fr; min-height: auto; }
    .series-header-right { height: 55vw; order: -1; }
    .series-hero-overlay { background: linear-gradient(to bottom, transparent 60%, var(--bg) 100%); }
    .series-header-left { padding: 2rem 1.25rem 2.5rem; }
    .back-link { margin-bottom: 1.5rem; }
    .series-page-title { font-size: clamp(2.5rem, 9vw, 4rem); }
    .series-description { max-width: 100%; font-size: 0.9rem; }
    .photos-section { padding: 2.5rem 1.25rem 4rem; }
    .photos-header { margin-bottom: 2rem; }
    .photo-grid { columns: 2; column-gap: 0.5rem; }
    .photo-item { margin-bottom: 0.5rem; }
  }

  @media (max-width: 480px) {
    .photo-grid { columns: 1; }
    .series-page-title { font-size: clamp(2.2rem, 10vw, 3rem); }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">tcof</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#archives">Archives</a></li>
  </ul>
</nav>

<!-- SERIES HEADER -->
<div class="series-header" id="series-header">
  <div class="series-header-left">
    <a href="index.html#archives" class="back-link reveal">Archives</a>
    <p class="series-eyebrow reveal" id="series-eyebrow">series</p>
    <h1 class="series-page-title reveal" id="series-page-title"></h1>
    <p class="series-page-meta reveal" id="series-page-meta"></p>
    <p class="series-description reveal" id="series-description"></p>
  </div>
  <div class="series-header-right">
    <img class="series-hero-img" id="series-hero-img" src="" alt="" loading="eager">
    <div class="series-hero-overlay"></div>
  </div>
</div>

<!-- PHOTO GRID -->
<section class="photos-section">
  <div class="photos-header reveal">
    <span class="photos-label">Photographs</span>
    <span class="photos-count" id="photos-count"></span>
  </div>
  <div class="photo-grid" id="photo-grid"></div>
</section>

<footer>
  <span>the chronicles of a film · felipe martins</span>
  <span>digital · 35mm · medium format</span>
</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <div class="lightbox-inner">
    <span class="lightbox-title" id="lb-title"></span>
    <button class="lightbox-close" aria-label="Close">Esc / close</button>
    <button class="lightbox-nav lightbox-prev" aria-label="Previous">←</button>
    <img class="lightbox-img" src="" alt="">
    <button class="lightbox-nav lightbox-next" aria-label="Next">→</button>
    <span class="lightbox-meta"></span>
  </div>
</div>

<script src="config.js"></script>
<script>
  // Get slug from URL
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('s');
  const s = series.find(x => x.slug === slug);

  if (!s) {
    document.querySelector('.series-page-title').textContent = 'Series not found';
  } else {
    // Update page title
    document.title = `${s.title} — the chronicles of a film`;

    // Header
    document.getElementById('series-page-title').textContent = s.title;
    document.getElementById('series-page-meta').textContent = s.meta;
    const descEl = document.getElementById('series-description');
    if (s.description) { descEl.textContent = s.description; } else { descEl.style.display = 'none'; }
    document.getElementById('series-eyebrow').textContent =
      `${String(series.indexOf(s) + 1).padStart(2,'0')} / ${series.length} series`;

    // Hero (first photo)
    const heroImg = document.getElementById('series-hero-img');
    heroImg.src = `${CLOUDINARY_BASE}/f_auto,q_auto,w_1400/${s.folder}/${s.photos[0]}`;
    heroImg.alt = s.title;

    // Photo count
    document.getElementById('photos-count').textContent = `${s.photos.length} photographs`;

    // Grid
    const grid = document.getElementById('photo-grid');
    const fullUrls = s.photos.map(p => `${CLOUDINARY_BASE}/f_auto,q_auto,w_1400/${s.folder}/${p}`);

    s.photos.forEach((p, i) => {
      const thumb = `${CLOUDINARY_BASE}/f_auto,q_auto,w_800/${s.folder}/${p}`;
      const item = document.createElement('div');
      item.className = 'photo-item reveal';
      item.style.transitionDelay = `${i * 0.05}s`;
      item.innerHTML = `
        <img src="${thumb}" alt="${s.title} ${i + 1}" loading="${i < 6 ? 'eager' : 'lazy'}">
        <span class="photo-index">${String(i + 1).padStart(3,'0')}</span>
      `;
      item.addEventListener('click', () => openLightbox(fullUrls, i, s.title));
      grid.appendChild(item);
    });
  }
</script>
<script src="main.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
<script>
  // Lightbox for series page (inline, no archive.html dependency)
  let lbPhotos = [], lbIdx = 0, lbTouchX = 0;
  const lb = document.getElementById('lightbox');
  const lbImg = lb.querySelector('.lightbox-img');
  const lbMeta = lb.querySelector('.lightbox-meta');
  const lbTitleEl = document.getElementById('lb-title');

  function openLightbox(photos, idx, title) {
    lbPhotos = photos; lbIdx = idx;
    lbTitleEl.textContent = title;
    showLbPhoto();
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function showLbPhoto() {
    lbImg.src = lbPhotos[lbIdx];
    lbMeta.textContent = `${String(lbIdx + 1).padStart(3,'0')} / ${String(lbPhotos.length).padStart(3,'0')}`;
  }

  function lbPrev() { lbIdx = (lbIdx - 1 + lbPhotos.length) % lbPhotos.length; showLbPhoto(); }
  function lbNext() { lbIdx = (lbIdx + 1) % lbPhotos.length; showLbPhoto(); }
  function closeLb() { lb.classList.remove('open'); document.body.style.overflow = ''; }

  lb.querySelector('.lightbox-close').addEventListener('click', closeLb);
  lb.querySelector('.lightbox-prev').addEventListener('click', lbPrev);
  lb.querySelector('.lightbox-next').addEventListener('click', lbNext);
  lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') lbPrev();
    if (e.key === 'ArrowRight') lbNext();
  });
  lb.addEventListener('touchstart', e => { lbTouchX = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - lbTouchX;
    if (Math.abs(dx) > 50) dx < 0 ? lbNext() : lbPrev();
  });
</script>
</body>
</html>
