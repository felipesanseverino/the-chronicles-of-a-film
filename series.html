<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1B1A18">
<meta name="description" content="a photo chapter from the chronicles of a film.">
<title>chapter — the chronicles of a film</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime:wght@400&family=Spectral:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --charcoal: #1B1A18;
    --ivory: #F2EDE0;
    --ochre: #C18A2E;
    --beige: #E6DECC;
    --grey: #8B857A;
    --espresso: #3A2E25;
    --olive: #4B4A37;
    --display: "Cormorant Garamond", Georgia, serif;
    --text: "Spectral", Georgia, serif;
    --mono: "Courier Prime", "Courier New", monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--charcoal);
    color: var(--ivory);
    font-family: var(--text);
    font-size: 18px;
    line-height: 1.7;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 20;
    opacity: 0.075;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/%3E%3C/svg%3E");
  }

  a { color: inherit; }

  .site-header {
    position: fixed;
    z-index: 30;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    gap: 24px;
    padding: 26px max(22px, 8vw);
    background: linear-gradient(to bottom, rgba(27, 26, 24, 0.92), rgba(27, 26, 24, 0));
  }

  .wordmark {
    font-family: var(--display);
    font-size: clamp(18px, 2.2vw, 25px);
    font-weight: 300;
    text-decoration: none;
    white-space: nowrap;
  }

  .wordmark em {
    color: var(--ochre);
    font-style: italic;
  }

  .site-nav {
    display: flex;
    gap: clamp(18px, 3vw, 38px);
    font-size: 15px;
  }

  .site-nav a {
    color: rgba(242, 237, 224, 0.82);
    text-decoration: none;
    text-transform: lowercase;
    border-bottom: 1px solid transparent;
  }

  .site-nav a:hover,
  .site-nav a[aria-current="page"] {
    color: var(--ivory);
    border-color: var(--ochre);
  }

  .chapter-hero {
    min-height: 100svh;
    position: relative;
    overflow: hidden;
    display: block;
    padding: 0;
    background: #11100f;
  }

  .hero-image {
    width: 100%;
    height: 100svh;
    display: block;
    object-fit: cover;
    background: #11100f;
    filter: contrast(1.02) saturate(0.92);
    cursor: zoom-in;
  }

  .chapter-hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, rgba(27, 26, 24, 0.8), rgba(27, 26, 24, 0.42) 42%, rgba(27, 26, 24, 0.08)),
      linear-gradient(to bottom, rgba(27, 26, 24, 0.62), rgba(27, 26, 24, 0.1) 34%, rgba(27, 26, 24, 0.7));
    pointer-events: none;
  }

  .kicker,
  .photo-meta,
  .colophon,
  .footer-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--grey);
    text-transform: lowercase;
  }

  .hero-copy h1 {
    margin: 18px 0 20px;
    font-family: var(--display);
    font-size: clamp(62px, 9vw, 132px);
    font-style: italic;
    font-weight: 300;
    line-height: 0.86;
  }

  .hero-copy {
    position: absolute;
    z-index: 2;
    left: max(22px, 8vw);
    right: max(22px, 8vw);
    bottom: clamp(58px, 11vh, 116px);
    max-width: 880px;
  }

  .hero-copy p {
    max-width: 48ch;
    margin: 0;
    color: rgba(242, 237, 224, 0.76);
    font-size: clamp(18px, 2vw, 23px);
    line-height: 1.58;
  }

  .sequence {
    padding: 14vh max(22px, 8vw);
  }

  .sequence-inner {
    max-width: 1080px;
    margin: 0 auto;
  }

  .sequence-head {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    align-items: baseline;
    padding-bottom: 18px;
    margin-bottom: 96px;
    border-bottom: 1px solid rgba(139, 133, 122, 0.28);
  }

  .sequence-head h2 {
    margin: 0;
    font-family: var(--display);
    font-size: clamp(36px, 5vw, 66px);
    font-style: italic;
    font-weight: 300;
    line-height: 1;
  }

  .photo-sequence {
    display: grid;
    gap: 118px;
  }

  .photo-frame {
    margin: 0;
  }

  .photo-frame:nth-child(3n + 1) { width: 82%; }
  .photo-frame:nth-child(3n + 2) { width: 58%; margin-left: auto; }
  .photo-frame:nth-child(3n) { width: 70%; margin-left: 10%; }

  .photo-frame img {
    width: 100%;
    display: block;
    background: #11100f;
    object-fit: cover;
    filter: contrast(1.02) saturate(0.94);
    cursor: zoom-in;
  }

  .contact-sheet {
    padding: 13vh max(22px, 8vw);
    background: #211f1c;
  }

  .contact-sheet-inner {
    max-width: 1180px;
    margin: 0 auto;
  }

  .contact-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 24px;
    margin-bottom: 32px;
  }

  .contact-head h2 {
    margin: 0;
    font-family: var(--display);
    font-size: clamp(34px, 5vw, 62px);
    font-style: italic;
    font-weight: 300;
  }

  .contact-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .contact-item {
    margin: 0;
    background: #11100f;
  }

  .contact-item img {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: block;
    object-fit: cover;
    filter: contrast(1.03) saturate(0.86);
    cursor: zoom-in;
  }

  .photo-lightbox {
    position: fixed;
    inset: 0;
    z-index: 80;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    gap: 18px;
    padding: max(22px, 4vw);
    background: rgba(10, 9, 8, 0.94);
    opacity: 0;
    pointer-events: none;
    transition: opacity 160ms ease;
  }

  .photo-lightbox[aria-hidden="false"] {
    opacity: 1;
    pointer-events: auto;
  }

  .photo-lightbox__top,
  .photo-lightbox__meta {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    color: rgba(242, 237, 224, 0.68);
    text-transform: lowercase;
  }

  .photo-lightbox__close,
  .photo-lightbox__nav {
    color: var(--ivory);
    background: rgba(27, 26, 24, 0.44);
    border: 1px solid rgba(242, 237, 224, 0.2);
    border-radius: 999px;
    cursor: pointer;
  }

  .photo-lightbox__close {
    width: 44px;
    height: 44px;
    font-family: var(--mono);
    font-size: 22px;
    line-height: 1;
  }

  .photo-lightbox__stage {
    position: relative;
    min-height: 0;
    display: grid;
    place-items: center;
  }

  .photo-lightbox__image {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    box-shadow: 0 28px 90px rgba(0, 0, 0, 0.48);
  }

  .photo-lightbox__nav {
    position: absolute;
    top: 50%;
    z-index: 2;
    width: 48px;
    height: 48px;
    transform: translateY(-50%);
    font-size: 28px;
    line-height: 1;
  }

  .photo-lightbox__nav--prev { left: 0; }
  .photo-lightbox__nav--next { right: 0; }

  .photo-lightbox button:hover {
    border-color: rgba(193, 138, 46, 0.72);
    color: var(--ochre);
  }

  body.archive-page .chapter-hero {
    min-height: 100svh;
    border-bottom: 1px solid rgba(139, 133, 122, 0.24);
  }

  body.archive-page .hero-image {
    height: 100svh;
  }

  body.archive-page .sequence,
  body.chapter-page .contact-sheet {
    display: none;
  }

  body.archive-page .contact-sheet {
    padding-top: 10vh;
    background: var(--charcoal);
  }

  body.archive-page .contact-sheet-inner {
    max-width: none;
  }

  body.archive-page .contact-head {
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(139, 133, 122, 0.28);
  }

  body.archive-page .contact-head h2 {
    font-family: var(--mono);
    font-size: 12px;
    font-style: normal;
    color: var(--grey);
    text-transform: lowercase;
  }

  body.archive-page .contact-grid {
    grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
    gap: 8px;
  }

  body.archive-page .contact-item img {
    filter: contrast(1.02) saturate(0.9);
  }

  .site-footer {
    display: flex;
    justify-content: space-between;
    gap: 28px;
    padding: 38px max(22px, 8vw);
    border-top: 1px solid rgba(139, 133, 122, 0.24);
    color: var(--grey);
  }

  .site-footer a {
    color: var(--ochre);
    text-decoration: none;
  }

  @media (min-width: 861px) {
    .photo-lightbox {
      display: block;
      padding: 0;
    }

    .photo-lightbox__stage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .photo-lightbox__image {
      width: 100vw;
      height: 100svh;
      max-width: none;
      max-height: none;
      object-fit: contain;
    }

    .photo-lightbox__top,
    .photo-lightbox__meta {
      position: absolute;
      left: max(24px, 4vw);
      right: max(24px, 4vw);
    }

    .photo-lightbox__top {
      top: max(22px, 4vh);
    }

    .photo-lightbox__meta {
      bottom: max(22px, 4vh);
    }

    .photo-lightbox__nav--prev { left: max(18px, 3vw); }
    .photo-lightbox__nav--next { right: max(18px, 3vw); }
  }

  @media (max-width: 860px) {
    .site-header {
      align-items: flex-start;
      padding-top: 20px;
    }

    .site-nav {
      gap: 14px;
      font-size: 14px;
    }

    .chapter-hero {
      min-height: 100svh;
    }

    .hero-image {
      height: 100svh;
      aspect-ratio: auto;
      object-position: 54% center;
    }

    .chapter-hero::after {
      background:
        linear-gradient(to bottom, rgba(27, 26, 24, 0.72), rgba(27, 26, 24, 0.24) 34%, rgba(27, 26, 24, 0.82)),
        rgba(27, 26, 24, 0.12);
    }

    .hero-copy {
      bottom: 58px;
    }

    .hero-copy h1 {
      font-size: clamp(54px, 16vw, 84px);
    }

    .hero-copy p {
      max-width: 34ch;
    }

    .sequence,
    .contact-sheet {
      padding-top: 86px;
      padding-bottom: 86px;
    }

    .sequence-head,
    .contact-head {
      display: block;
      margin-bottom: 54px;
    }

    .photo-sequence {
      gap: 74px;
    }

    .photo-frame,
    .photo-frame:nth-child(3n + 1),
    .photo-frame:nth-child(3n + 2),
    .photo-frame:nth-child(3n) {
      width: 100%;
      margin-left: 0;
    }

    .contact-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
    }

    .photo-lightbox {
      padding: 16px;
      gap: 12px;
    }

    .photo-lightbox__nav {
      width: 42px;
      height: 42px;
      font-size: 24px;
      background: rgba(27, 26, 24, 0.62);
    }

    body.archive-page .chapter-hero {
      min-height: 100svh;
    }

    body.archive-page .hero-image {
      height: 100svh;
      aspect-ratio: auto;
    }

    body.archive-page .contact-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .site-footer { display: block; }
    .footer-meta + .footer-meta { margin-top: 10px; }
  }
</style>
</head>
<body>
  <header class="site-header">
    <a class="wordmark" href="/">the <em>chronicles</em> of a film</a>
    <nav class="site-nav" aria-label="primary">
      <a href="/archive.html">archive</a>
      <a href="/chapters.html">chapters</a>
      <a href="/#about">about</a>
    </nav>
  </header>

  <main>
    <section class="chapter-hero" aria-label="chapter opening">
      <img class="hero-image" id="hero-image" alt="chapter opening frame">
      <div class="hero-copy">
        <div class="kicker" id="chapter-meta">loading chapter</div>
        <h1 id="chapter-title">chapter</h1>
        <p id="chapter-description">
          every roll, numbered and kept.
        </p>
      </div>
    </section>

    <section class="sequence" aria-label="selected sequence">
      <div class="sequence-inner">
        <div class="sequence-head">
          <h2>selected frames</h2>
          <span class="photo-meta" id="selected-count"></span>
        </div>
        <div class="photo-sequence" id="photo-sequence"></div>
      </div>
    </section>

    <section class="contact-sheet" aria-label="contact sheet">
      <div class="contact-sheet-inner">
        <div class="contact-head">
          <h2>contact sheet</h2>
        </div>
        <div class="contact-grid" id="contact-grid"></div>
      </div>
    </section>

  </main>

  <div class="photo-lightbox" id="photo-lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="larger photo view">
    <div class="photo-lightbox__top">
      <span id="photo-lightbox-title"></span>
      <button class="photo-lightbox__close" type="button" aria-label="close larger photo view">×</button>
    </div>
    <div class="photo-lightbox__stage">
      <button class="photo-lightbox__nav photo-lightbox__nav--prev" type="button" aria-label="previous photo">‹</button>
      <img class="photo-lightbox__image" id="photo-lightbox-image" alt="">
      <button class="photo-lightbox__nav photo-lightbox__nav--next" type="button" aria-label="next photo">›</button>
    </div>
    <div class="photo-lightbox__meta">
      <span id="photo-lightbox-caption"></span>
      <span id="photo-lightbox-count"></span>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-meta" id="footer-title">the chronicles of a film</div>
    <div class="footer-meta"><a href="/archive.html">archive</a></div>
  </footer>

<script src="/config.js?v=20260613-archive-chapters"></script>
<script>
  const ARCHIVE_ROLLS = [
    47, 12, 83, 5, 68, 31, 96, 24, 57, 9, 74, 18, 62, 3, 89, 41, 55, 27, 98, 14,
    70, 36, 1, 92, 44, 21, 79, 6, 53, 33, 87, 16, 60, 39, 95, 11, 72, 29, 50, 8,
    66, 23, 91, 45, 4, 77, 34, 58, 19, 84, 2, 64, 38, 97, 25, 51, 13, 69, 30, 88,
    7, 56, 42, 80, 17, 94, 35, 61, 10, 73, 28, 99, 46, 15, 67, 32, 86, 22, 59, 40,
    93, 26, 71, 49, 20, 82, 37, 90, 54, 43, 75, 63, 48, 85, 52, 65, 76, 78, 81
  ];

  const sourceSeries = typeof series !== "undefined" && Array.isArray(series) ? series : [];
  const archivePhotoFolderIndex = sourceSeries.reduce((index, item) => {
    if (item.type === "chapter" || !item.folder || !Array.isArray(item.photos)) return index;
    item.photos.forEach((photo) => {
      if (!index[photo]) index[photo] = item.folder;
    });
    return index;
  }, {});

  function photoFolderFor(item, photo) {
    if (item.photoFolders && item.photoFolders[photo]) return item.photoFolders[photo];
    if (archivePhotoFolderIndex[photo]) return archivePhotoFolderIndex[photo];
    if (item.type === "chapter" && item.slug) return `chronicles/${item.slug}`;
    return item.folder;
  }

  function imageUrl(item, photo, width = 1400, crop = "") {
    const folder = photoFolderFor(item, photo);
    const transform = crop ? `f_auto,q_auto,w_${width},${crop}` : `f_auto,q_auto,w_${width}`;
    return `${CLOUDINARY_BASE}/${transform}/${folder}/${encodeURIComponent(photo)}`;
  }

  function validPhotoList(item, list, fallback) {
    const available = new Set(item.photos || []);
    const requested = Array.isArray(list) ? list.filter((photo) => available.has(photo)) : [];
    return requested.length ? requested : fallback;
  }
  const params = new URLSearchParams(window.location.search);
  const requestedSlug = params.get("s");
  const chapter = sourceSeries.find((item) => item.slug === requestedSlug) || sourceSeries[0];
  const chapterIndex = Math.max(0, sourceSeries.indexOf(chapter));
  const lightboxPhotos = [];

  function addLightboxPhoto({ img, item, photo, label, index }) {
    if (!img || !item || !photo) return;
    const lightboxIndex = lightboxPhotos.length;
    lightboxPhotos.push({
      src: imageUrl(item, photo, 2200),
      alt: img.alt || `${item.title.toLowerCase()} frame ${index + 1}`,
      title: item.title.toLowerCase(),
      caption: label
    });
    img.dataset.lightboxIndex = lightboxIndex;
    img.setAttribute("tabindex", "0");
    img.setAttribute("role", "button");
    img.setAttribute("aria-label", `open larger version of ${label}`);
  }

  if (chapter) {
    document.title = `${chapter.title.toLowerCase()} — the chronicles of a film`;
    const contentType = chapter.type === "chapter" ? "chapter" : "archive";
    document.body.classList.add(`${contentType}-page`);
    const typeIndex = sourceSeries
      .filter((item) => (item.type === "chapter" ? "chapter" : "archive") === contentType)
      .indexOf(chapter);
    const contentNumber = contentType === "chapter"
      ? String(typeIndex + 1).padStart(2, "0")
      : String(ARCHIVE_ROLLS[typeIndex % ARCHIVE_ROLLS.length]).padStart(3, "0");
    const contentLabel = contentType === "chapter" ? "chapter" : "roll";
    document.getElementById("chapter-title").textContent = chapter.title.toLowerCase();
    document.getElementById("chapter-meta").textContent = `${contentLabel} ${contentNumber} — ${chapter.meta.toLowerCase()}`;
    document.getElementById("selected-count").textContent = `${chapter.photos.length} frames`;
    document.getElementById("footer-title").textContent = `${chapter.title.toLowerCase()} · the chronicles of a film`;
    if (chapter.description) {
      document.getElementById("chapter-description").textContent = chapter.description
        .replace(/\s*more info about the project here:.*/i, "")
        .trim();
    }
    const heroPhoto = chapter.photos[1] || chapter.photos[0];
    const heroImage = document.getElementById("hero-image");
    heroImage.src = imageUrl(chapter, heroPhoto, 1800);
    addLightboxPhoto({
      img: heroImage,
      item: chapter,
      photo: heroPhoto,
      label: `${contentLabel} ${contentNumber} opening frame`,
      index: 0
    });

    if (contentType === "chapter") {
      const selected = validPhotoList(chapter, chapter.selectedPhotos, chapter.photos);
      const sequence = document.getElementById("photo-sequence");
      selected.forEach((photo, index) => {
        const figure = document.createElement("figure");
        figure.className = "photo-frame";
        const img = document.createElement("img");
        img.src = imageUrl(chapter, photo, index < 2 ? 1500 : 1200);
        img.alt = `${chapter.title.toLowerCase()} frame ${index + 1}`;
        img.loading = index < 2 ? "eager" : "lazy";
        addLightboxPhoto({
          img,
          item: chapter,
          photo,
          label: `selected frame ${index + 1}`,
          index
        });
        figure.appendChild(img);
        sequence.appendChild(figure);
      });
    }

    if (contentType === "archive") {
      const contact = document.getElementById("contact-grid");
      const contactHeading = document.querySelector(".contact-head h2");
      if (contactHeading) contactHeading.textContent = "archive contact sheet";
      const contactPhotos = validPhotoList(chapter, chapter.contactSheetPhotos, chapter.photos);
      contactPhotos.forEach((photo, index) => {
        const figure = document.createElement("figure");
        figure.className = "contact-item";
        const img = document.createElement("img");
        img.src = imageUrl(chapter, photo, 520, "c_fill,ar_1:1");
        img.alt = `contact frame ${index + 1}`;
        img.loading = "lazy";
        addLightboxPhoto({
          img,
          item: chapter,
          photo,
          label: `contact frame ${index + 1}`,
          index
        });
        figure.appendChild(img);
        contact.appendChild(figure);
      });
    }
  }

  const lightbox = document.getElementById("photo-lightbox");
  const lightboxImage = document.getElementById("photo-lightbox-image");
  const lightboxTitle = document.getElementById("photo-lightbox-title");
  const lightboxCaption = document.getElementById("photo-lightbox-caption");
  const lightboxCount = document.getElementById("photo-lightbox-count");
  const lightboxPrev = lightbox.querySelector(".photo-lightbox__nav--prev");
  const lightboxNext = lightbox.querySelector(".photo-lightbox__nav--next");
  const lightboxClose = lightbox.querySelector(".photo-lightbox__close");
  let activeLightboxIndex = 0;
  let previousFocus = null;
  let touchStartX = 0;

  function showLightboxPhoto(index) {
    if (!lightboxPhotos.length) return;
    activeLightboxIndex = (index + lightboxPhotos.length) % lightboxPhotos.length;
    const photo = lightboxPhotos[activeLightboxIndex];
    lightboxImage.src = photo.src;
    lightboxImage.alt = photo.alt;
    lightboxTitle.textContent = photo.title;
    lightboxCaption.textContent = photo.caption;
    lightboxCount.textContent = `${String(activeLightboxIndex + 1).padStart(2, "0")} / ${String(lightboxPhotos.length).padStart(2, "0")}`;
  }

  function openLightbox(index) {
    previousFocus = document.activeElement;
    showLightboxPhoto(index);
    lightbox.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
    lightboxClose.focus();
  }

  function closeLightbox() {
    lightbox.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
    lightboxImage.removeAttribute("src");
    if (previousFocus && typeof previousFocus.focus === "function") previousFocus.focus();
  }

  function previousPhoto() {
    showLightboxPhoto(activeLightboxIndex - 1);
  }

  function nextPhoto() {
    showLightboxPhoto(activeLightboxIndex + 1);
  }

  document.addEventListener("click", (event) => {
    const trigger = event.target.closest("[data-lightbox-index]");
    if (trigger) openLightbox(Number(trigger.dataset.lightboxIndex));
  });

  document.addEventListener("keydown", (event) => {
    const trigger = event.target.closest("[data-lightbox-index]");
    if (trigger && (event.key === "Enter" || event.key === " ")) {
      event.preventDefault();
      openLightbox(Number(trigger.dataset.lightboxIndex));
      return;
    }

    if (lightbox.getAttribute("aria-hidden") === "true") return;
    if (event.key === "Escape") closeLightbox();
    if (event.key === "ArrowLeft") previousPhoto();
    if (event.key === "ArrowRight") nextPhoto();
  });

  lightbox.addEventListener("click", (event) => {
    if (event.target === lightbox) closeLightbox();
  });
  lightboxClose.addEventListener("click", closeLightbox);
  lightboxPrev.addEventListener("click", previousPhoto);
  lightboxNext.addEventListener("click", nextPhoto);
  lightbox.addEventListener("touchstart", (event) => {
    touchStartX = event.touches[0].clientX;
  }, { passive: true });
  lightbox.addEventListener("touchend", (event) => {
    const dx = event.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 48) dx < 0 ? nextPhoto() : previousPhoto();
  });
</script>
<script>
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");
</script>
</body>
