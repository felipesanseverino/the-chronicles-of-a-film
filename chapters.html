<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1B1A18">
<meta name="description" content="the chapter index for the chronicles of a film.">
<title>chapters — the chronicles of a film</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime:wght@400&family=Spectral:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --charcoal: #1B1A18;
    --ivory: #F2EDE0;
    --ochre: #C18A2E;
    --beige: #E6DECC;
    --grey: #8B857A;
    --espresso: #3A2E25;
    --display: "Cormorant Garamond", Georgia, serif;
    --text: "Spectral", Georgia, serif;
    --mono: "Courier Prime", "Courier New", monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--charcoal);
    color: var(--ivory);
    font-family: var(--text);
    font-size: 18px;
    line-height: 1.7;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 20;
    opacity: 0.075;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/%3E%3C/svg%3E");
  }

  a { color: inherit; }

  .site-header {
    position: fixed;
    z-index: 30;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    gap: 24px;
    padding: 26px max(22px, 8vw);
    background: linear-gradient(to bottom, rgba(27, 26, 24, 0.92), rgba(27, 26, 24, 0));
  }

  .wordmark {
    font-family: var(--display);
    font-size: clamp(18px, 2.2vw, 25px);
    font-weight: 300;
    text-decoration: none;
    white-space: nowrap;
  }

  .wordmark em {
    color: var(--ochre);
    font-style: italic;
  }

  .site-nav {
    display: flex;
    gap: clamp(18px, 3vw, 38px);
    font-size: 15px;
  }

  .site-nav a {
    color: rgba(242, 237, 224, 0.82);
    text-decoration: none;
    text-transform: lowercase;
    border-bottom: 1px solid transparent;
  }

  .site-nav a:hover,
  .site-nav a[aria-current="page"] {
    color: var(--ivory);
    border-color: var(--ochre);
  }

  .page {
    padding: 142px max(22px, 8vw) 12vh;
  }

  .page-head {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.9fr);
    gap: min(8vw, 120px);
    align-items: end;
    margin-bottom: 92px;
  }

  .kicker,
  .archive-meta,
  .footer-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--grey);
    text-transform: lowercase;
  }

  h1 {
    margin: 18px 0 0;
    max-width: 840px;
    font-family: var(--display);
    font-size: clamp(58px, 12vw, 148px);
    font-style: italic;
    font-weight: 300;
    line-height: 0.86;
  }

  .intro {
    margin: 0;
    color: rgba(242, 237, 224, 0.76);
    font-size: clamp(19px, 2vw, 25px);
    line-height: 1.58;
  }

  .archive-heading {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(139, 133, 122, 0.28);
  }

  .archive-heading h2 {
    margin: 0;
    font-family: var(--display);
    font-size: clamp(34px, 5vw, 62px);
    font-style: italic;
    font-weight: 300;
    line-height: 1;
  }

  .archive-list {
    max-width: 1180px;
    margin: 0 auto;
  }

  .archive-row {
    position: relative;
    display: grid;
    grid-template-columns: 128px minmax(0, 1fr) 230px 64px;
    gap: 28px;
    align-items: baseline;
    padding: 25px 0 23px;
    border-bottom: 1px solid rgba(139, 133, 122, 0.24);
    text-decoration: none;
  }

  .archive-title {
    font-family: var(--display);
    font-size: clamp(31px, 4vw, 58px);
    font-style: italic;
    font-weight: 300;
    line-height: 1;
  }

  .archive-row:hover .archive-title {
    color: var(--ochre);
  }

  .archive-arrow {
    color: var(--grey);
    text-align: right;
  }

  .archive-thumb {
    position: absolute;
    top: 50%;
    right: 14%;
    width: min(24vw, 300px);
    aspect-ratio: 4 / 3;
    object-fit: cover;
    opacity: 0;
    transform: translateY(-50%) translateX(18px);
    pointer-events: none;
    transition: opacity 180ms ease, transform 180ms ease;
    box-shadow: 0 26px 80px rgba(0, 0, 0, 0.34);
  }

  .archive-row:hover .archive-thumb {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
  }

  .site-footer {
    display: flex;
    justify-content: space-between;
    gap: 28px;
    padding: 38px max(22px, 8vw);
    border-top: 1px solid rgba(139, 133, 122, 0.24);
    color: var(--grey);
  }

  .site-footer a {
    color: var(--ochre);
    text-decoration: none;
  }

  @media (max-width: 850px) {
    .site-header {
      align-items: flex-start;
      padding-top: 20px;
    }

    .site-nav {
      gap: 14px;
      font-size: 14px;
    }

    .page {
      padding-top: 108px;
      padding-bottom: 82px;
    }

    .page-head {
      grid-template-columns: 1fr;
    }

    .page-head {
      gap: 34px;
      margin-bottom: 68px;
    }

    .archive-row {
      grid-template-columns: 72px minmax(0, 1fr) 30px;
      gap: 16px;
      padding: 21px 0;
    }

    .archive-row .archive-meta:nth-of-type(3) {
      grid-column: 2;
    }

    .archive-thumb { display: none; }

    .site-footer { display: block; }
    .footer-meta + .footer-meta { margin-top: 10px; }
  }
</style>
</head>
<body>
  <header class="site-header">
    <a class="wordmark" href="/">the <em>chronicles</em> of a film</a>
    <nav class="site-nav" aria-label="primary">
      <a href="/archive.html">archive</a>
      <a href="/chapters.html" aria-current="page">chapters</a>
      <a href="/#about">about</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-head" aria-label="chapter introduction">
      <div>
        <div class="kicker">chapter index</div>
        <h1>ideas, gathered as chapters.</h1>
      </div>
      <p class="intro">
        chapters are based on ideas, themes, moods, and observations. photographs can move
        between chapters when they share the same feeling.
      </p>
    </section>

    <section aria-label="all chapters">
      <div class="archive-heading">
        <h2>chapter catalog</h2>
        <span class="kicker" id="archive-count"></span>
      </div>
      <div class="archive-list" id="archive-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-meta">the chronicles of a film · chapters</div>
    <div class="footer-meta"><a href="/">home</a></div>
  </footer>

<script src="/config.js?v=20260613-archive-chapters"></script>
<script>
  function imageUrl(item, photo, width = 1000, crop = "") {
    const folder = item.photoFolders && item.photoFolders[photo]
      ? item.photoFolders[photo]
      : photoFolderIndex[photo] || item.folder;
    const transform = crop ? `f_auto,q_auto,w_${width},${crop}` : `f_auto,q_auto,w_${width}`;
    return `${CLOUDINARY_BASE}/${transform}/${folder}/${encodeURIComponent(photo)}`;
  }

  const sourceSeries = typeof series !== "undefined" && Array.isArray(series) ? series : [];
  const photoFolderIndex = sourceSeries.reduce((index, item) => {
    if (!item.folder || !Array.isArray(item.photos)) return index;
    item.photos.forEach((photo) => {
      if (!index[photo]) index[photo] = item.folder;
    });
    return index;
  }, {});
  const chapters = sourceSeries.filter((item) => (item.type || "archive") === "chapter");
  document.getElementById("archive-count").textContent = `${chapters.length} chapters`;

  const archiveList = document.getElementById("archive-list");
  chapters.forEach((item, index) => {
    const row = document.createElement("a");
    row.className = "archive-row";
    row.href = `/series.html?s=${item.slug}`;
    const selected = Array.isArray(item.selectedPhotos) && item.selectedPhotos.length ? item.selectedPhotos : item.photos;
    const photo = selected?.[index % selected.length] || selected?.[0] || item.photos?.[0];
    row.innerHTML = `
      <span class="archive-meta">chapter ${String(index + 1).padStart(2, "0")}</span>
      <span class="archive-title">${item.title.toLowerCase()}</span>
      <span class="archive-meta">${(item.meta || "digital").toLowerCase()}</span>
      <span class="archive-arrow">→</span>
      ${photo ? `<img class="archive-thumb" src="${imageUrl(item, photo, 620, "c_fill,ar_4:3")}" alt="">` : ""}
    `;
    archiveList.appendChild(row);
  });
</script>
<script>
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");
</script>
</body>
</html>
